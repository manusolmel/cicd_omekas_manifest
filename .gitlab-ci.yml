default:
  tags:
    - k8s

stages:
  - prepare
  - build
  - test
  - publish
  - deploy

prepare_context:
  stage: prepare
  image: python:3.12-alpine
  before_script:
    - apk add --no-cache git
    - pip install --no-cache-dir pyyaml
  script:
    - python tools/validate_manifest.py manifest.yml
    - python tools/fetch.py
    - python tools/write_build_env.py manifest.yml
  artifacts:
    expire_in: 1 day
    paths:
      - build-context/
    reports:
      dotenv: .ci/build.env

build_image:
  stage: build
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  needs:
    - job: prepare_context
      artifacts: true
  script:
    - docker manifest inspect "$BASE_IMAGE:$BASE_TAG"
    - >-
      docker build
      --pull
      --file Dockerfile
      --tag "$TARGET_IMAGE"
      --build-arg BASE_IMAGE="$BASE_IMAGE"
      --build-arg BASE_TAG="$BASE_TAG"
      --build-arg BUILD_DATE="$BUILD_DATE"
      --build-arg VCS_REF="$VCS_REF"
      .
    # Export the image as a tar so the next stage can load it without a registry
    - mkdir -p .ci
    - docker save "$TARGET_IMAGE" -o .ci/image.tar
  artifacts:
    expire_in: 1 day
    paths:
      - .ci/image.tar

smoke_test:
  stage: test
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  needs:
    - job: build_image
      artifacts: true
    - job: prepare_context
      artifacts: true
  script:
    # Load the image from the artifact
    - docker load -i .ci/image.tar
    - docker run --rm "$TARGET_IMAGE" php -v
    - |
      for dir in build-context/modules/*/; do
        name=$(basename "$dir")
        echo "Checking module: $name"
        docker run --rm "$TARGET_IMAGE" ls "/var/www/html/modules/$name"
      done
    - |
      for dir in build-context/themes/*/; do
        name=$(basename "$dir")
        echo "Checking theme: $name"
        docker run --rm "$TARGET_IMAGE" ls "/var/www/html/themes/$name"
      done

publish_image:
  stage: publish
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  needs:
    - job: smoke_test
      artifacts: false
    - job: build_image
      artifacts: true
    - job: prepare_context
      artifacts: true
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker load -i .ci/image.tar
    - docker push "$TARGET_IMAGE"

deploy_k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - job: publish_image
      artifacts: false
    - job: prepare_context
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "feature/k8s-deploy"
  script:
    - echo "Deploying $TARGET_IMAGE to Kubernetes . . . "
    - kubectl config set-cluster k8s-cluster
        --server="$KUBE_API_URL"
        --certificate-authority=/dev/null
        --insecure-skip-tls-verify=true
    - kubectl config set-credentials gitlab-deployer
        --token="$KUBE_TOKEN"
    - kubectl config set-context deploy
        --cluster=k8s-cluster
        --user=gitlab-deployer
        --namespace=omeka
    - kubectl config use-context deploy
    - kubectl set image deployment/omeka omeka="$TARGET_IMAGE" -n omeka
    - kubectl rollout status deployment/omeka -n omeka --timeout=120s