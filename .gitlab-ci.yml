#   tags:
#     - k8s

stages:
  - prepare
  - build
  - test
  - publish
  - deploy

prepare_context:
  stage: prepare
  image: python:3.12-alpine
  before_script:
    - apk add --no-cache git
    - pip install --no-cache-dir pyyaml
  script:
    - python tools/validate_manifest.py manifest.yml
    - python tools/fetch.py
    - python tools/write_build_env.py manifest.yml
  artifacts:
    expire_in: 1 day
    paths:
      - build-context/
    reports:
      dotenv: .ci/build.env

build_image:
  stage: build
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: 1
  needs:
    - job: prepare_context
      artifacts: true
  script:
    - |
      TAG_DIGEST=$(docker manifest inspect --verbose "$BASE_IMAGE:$BASE_TAG" \
        | awk '
            /"Descriptor": \{/ { in_desc=1; next }
            in_desc && /"digest":/ {
              gsub(/[",]/, "", $2)
              print $2
              exit
            }
          ')
      if [ -z "$TAG_DIGEST" ]; then
        echo "ERROR: could not resolve digest for $BASE_IMAGE:$BASE_TAG"
        exit 1
      fi
      if [ "$TAG_DIGEST" != "$BASE_DIGEST" ]; then
        echo "ERROR: manifest base.tag/base.digest mismatch"
        echo "  tag digest:    $TAG_DIGEST"
        echo "  manifest value:$BASE_DIGEST"
        exit 1
      fi
    - docker manifest inspect "$BASE_IMAGE@$BASE_DIGEST"
    # Log in to the registry during the build stage to pull the stored cache
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
    - >-
      docker build
      --pull
      --file Dockerfile
      --tag "$TARGET_IMAGE"
      --cache-from "$CI_REGISTRY_IMAGE/cache:latest"
      --build-arg BUILDKIT_INLINE_CACHE=1
      --build-arg BASE_IMAGE="$BASE_IMAGE"
      --build-arg BASE_DIGEST="$BASE_DIGEST"
      --build-arg BUILD_DATE="$BUILD_DATE"
      --build-arg VCS_REF="$VCS_REF"
      .
    # Export the image as a tar so the next stage can load it without a registry
    - mkdir -p .ci
    - docker save "$TARGET_IMAGE" -o .ci/image.tar
  artifacts:
    expire_in: 1 day
    paths:
      - .ci/image.tar

smoke_test:
  stage: test
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  needs:
    - job: build_image
      artifacts: true
    - job: prepare_context
      artifacts: true
  script:
    # Load the image from the artifact
    - docker load -i .ci/image.tar
    - docker run --rm "$TARGET_IMAGE" php -v
    - |
      for dir in build-context/modules/*/; do
        name=$(basename "$dir")
        echo "Checking module: $name"
        docker run --rm "$TARGET_IMAGE" ls "/var/www/html/modules/$name"
      done
    - |
      for dir in build-context/themes/*/; do
        name=$(basename "$dir")
        echo "Checking theme: $name"
        docker run --rm "$TARGET_IMAGE" ls "/var/www/html/themes/$name"
      done

publish_image:
  stage: publish
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  needs:
    - job: smoke_test
      artifacts: false
    - job: build_image
      artifacts: true
    - job: prepare_context
      artifacts: true
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker load -i .ci/image.tar
    - docker push "$TARGET_IMAGE"
    # Tag and push the image as a cache to speed up future pipelines
    - docker tag "$TARGET_IMAGE" "$CI_REGISTRY_IMAGE/cache:latest"
    - docker push "$CI_REGISTRY_IMAGE/cache:latest"

deploy_k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - job: publish_image
      artifacts: false
    - job: prepare_context
      artifacts: true
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "Deploying $TARGET_IMAGE to Kubernetes . . . "
    - kubectl config set-cluster k8s-cluster
        --server="$KUBE_API_URL"
        --insecure-skip-tls-verify=true
    - kubectl config set-credentials gitlab-deployer
        --token="$KUBE_TOKEN"
    - kubectl config set-context deploy
        --cluster=k8s-cluster
        --user=gitlab-deployer
        --namespace=omeka
    - kubectl config use-context deploy
    - kubectl set image deployment/omeka omeka="$TARGET_IMAGE" -n omeka
    - kubectl rollout status deployment/omeka -n omeka --timeout=120s
